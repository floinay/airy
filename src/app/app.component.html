<air-page>
  <header airPaddingTop="m" airPaddingBottom="m" airPaddingStart="xl" airPaddingEnd="xl" airStickyHeader airLayout="row"
          xs.airLayout="column" xs.layoutAlign="center">
    <a routerLink="/"><air-icon name="logo" size="110px 54px"></air-icon></a>
    <air-form-field airFlex="1">
      <label air-label>Is Rtl</label>
      <air-toggle color="primary" [formControl]="direction" enabledValue="rtl" disabledValue="ltr"></air-toggle>
    </air-form-field>
  </header>
  <air-nav airStickyStart airPaddingTop="xxl">
    <a air-list-item href="" class="active">
      <air-icon size="l" name="nav/dashboard"></air-icon>
      Dashboard
    </a>
    <a air-list-item href="">
      <air-icon name="nav/courses" size="l"></air-icon>
      Courses
    </a>
  </air-nav>
  <air-container>
    <h1 airH4>Website settings</h1>
    <air-tabs-links mode="buttons" airMarginBottom="xl">
      <button routerLinkActive="active" air-button routerLink="/tabs" color="primary">Tabs</button>
      <button routerLinkActive="active" air-button color="primary" routerLink="/buttons">Buttons</button>
    </air-tabs-links>
    <air-tabs-links mode="tabs">
      <button routerLinkActive="active" air-button routerLink="/tabs" color="primary">Basic settings</button>
      <button routerLinkActive="active" air-button color="primary" routerLink="/buttons">SEO</button>
      <button routerLinkActive="active" air-button color="primary" routerLink="/buttons">Notifications</button>
    </air-tabs-links>
    <router-outlet></router-outlet>
  </air-container>
</air-page>
